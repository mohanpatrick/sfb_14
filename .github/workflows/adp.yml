on:
  schedule:
     - cron: "30 7,16 * * *"
  workflow_dispatch:
  
name: update_adp_mfl

jobs:
  adp_update_data:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.REPO_PAT }}
    steps:
      - uses: actions/checkout@v2
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ffscrapr, dplyr, data.table,tidyr,purrr, stringr, piggyback,cli,readr,lubridate
        name: Run data update
      - run: |
          source("unified_adp.R")
        shell: Rscript {0}
